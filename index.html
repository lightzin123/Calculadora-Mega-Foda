<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    
    <title>Calculadora Mega Foda</title>
</head>
<body>
    <div class="calc">
        <span class="tela">0</span>
            
        <table class="btns">
            <tr>
                <td data-clear>C</td>
                <td data-delete>&lt;</td> <td data-operator="*">x</td> <td data-operator="&#247;">&#247;</td>
            </tr>

            <tr>
                <td data-number="7">7</td>
                <td data-number="8">8</td>
                <td data-number="9">9</td>
                <td data-operator="-">-</td>
            </tr>

            <tr>
                <td data-number="4">4</td>
                <td data-number="5">5</td>
                <td data-number="6">6</td>
                <td data-operator="+">+</td>
            </tr>

            <tr>
                <td data-number="1">1</td>
                <td data-number="2">2</td>
                <td data-number="3">3</td>
                <td rowspan="2" data-equals>=</td> </tr>

            <tr>
                <td colspan="2" data-number="0">0</td>
                <td data-number=".">.</td>
            </tr>
        </table>
    </div>

    
</body>
<script src="java.js"></script>
</html>
